<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #16342F;
    --panel: #1F433C;
    --panel-2: #234B43;
    --amber: #E8A33D;
    --amber-dark: #7A5217;
    --coral: #E8664F;
    --coral-dark: #7A2C1E;
    --cream: #F6F1E4;
    --sage: #9AB3A6;
    --line: rgba(246,241,228,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 32px 16px 60px;
  }
  .app{
    width:100%;
    max-width:420px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:28px;
    margin: 4px 0 2px;
    letter-spacing: -0.5px;
  }
  .sub{
    color: var(--sage);
    font-size:14px;
    margin: 0 0 24px;
  }
  .tabs{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:20px;
  }
  .tab{
    flex: 1 1 21%;
    padding:11px 6px;
    text-align:center;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    font-size:13px;
    color: var(--sage);
    cursor:pointer;
    user-select:none;
    transition: transform 0.12s ease, background 0.15s ease, color 0.15s ease;
  }
  .tab:active{ transform: scale(0.96); }
  .tab.active{
    background: var(--amber);
    color: var(--amber-dark);
    border-color: var(--amber);
  }
  .stage{
    background: var(--panel);
    border-radius: 16px;
    border: 1px solid var(--line);
    padding: 28px 20px 24px;
    min-height: 260px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .ticket{
    width:100%;
    background: var(--cream);
    color: #26221A;
    border-radius: 12px;
    padding: 22px 18px 18px;
    position:relative;
    text-align:center;
    animation: drop 0.35s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes drop{
    from{ transform: translateY(-18px); opacity:0; }
    to{ transform: translateY(0); opacity:1; }
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width:16px; height:16px;
    background: var(--panel);
    border-radius:50%;
    top:50%;
    transform: translateY(-50%);
  }
  .ticket::before{ left:-8px; }
  .ticket::after{ right:-8px; }
  .ticket-label{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:#8A8368;
    margin:0 0 10px;
  }
  .ticket-result{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:24px;
    line-height:1.25;
    margin:0;
  }
  .empty-hint{
    color: var(--sage);
    font-size:14px;
    text-align:center;
    line-height:1.6;
  }
  .dial-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 18px;
    margin-top: 22px;
  }
  .dial{
    width:84px; height:84px;
    border-radius:50%;
    background: var(--coral);
    color: var(--cream);
    border:none;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.12s ease;
  }
  .dial:active{ transform: scale(0.92); }
  .feedback-row{
    display:flex;
    gap:10px;
    margin-top:16px;
    justify-content:center;
  }
  .fbtn{
    width:44px; height:44px;
    border-radius:50%;
    border:1px solid var(--line);
    background: var(--panel-2);
    color: var(--cream);
    font-size:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.12s ease, background 0.15s ease;
  }
  .fbtn:active{ transform: scale(0.9); }
  .fbtn.up:hover{ background: #2E5A50; }
  .fbtn.down:hover{ background: #5A2E2E; }
  .fbtn.th{
    width:auto;
    padding: 0 14px;
    border-radius: 22px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    font-size:13px;
    background: rgba(232,163,61,0.14);
    border-color: var(--amber);
    color: var(--amber);
  }
  .section-title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    font-size:15px;
    margin: 26px 0 10px;
    color: var(--sage);
  }
  .chip-grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    padding:9px 14px;
    border-radius:20px;
    border:1px solid var(--line);
    background: var(--panel);
    color: var(--sage);
    font-size:13.5px;
    cursor:pointer;
    user-select:none;
    transition: all 0.15s ease;
  }
  .chip.on{
    background: rgba(232,163,61,0.16);
    border-color: var(--amber);
    color: var(--amber);
  }
  .chip:active{ transform: scale(0.95); }
  .add-row{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .add-row input{
    flex:1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    color: var(--cream);
    font-size:14px;
    font-family:'Inter', sans-serif;
  }
  .add-row input::placeholder{ color: #5C7A6E; }
  .add-row button{
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--cream);
    border-radius:10px;
    padding: 0 16px;
    font-size:14px;
    cursor:pointer;
  }
  .footer-link{
    text-align:center;
    margin-top:24px;
    font-size:13px;
    color: var(--sage);
    cursor:pointer;
    text-decoration: underline;
    text-underline-offset:3px;
  }
  .badge-time{
    font-size:12px;
    color: var(--sage);
    text-align:center;
    margin: -8px 0 18px;
  }
</style>
</head>

let state = { eat:{}, do:{}, work:{}, quote:{} };
let current = { category:null, item:null };
let editMode = false;
let showingThai = false;

function mealPeriod(){
  const h = new Date().getHours();
  if (h < 11) return "breakfast";
  if (h < 16) return "lunch";
  return "dinner";
}

function buildDefaultState(){
  for (const cat of Object.keys(DEFAULTS)){
    if (DEFAULTS[cat].isRange){
      state[cat] = { min: DEFAULTS[cat].defaultMin, max: DEFAULTS[cat].defaultMax };
      continue;
    }
    const merged = {};
    for (const period of Object.keys(DEFAULTS[cat].items)){
      merged[period] = {};
      DEFAULTS[cat].items[period].forEach(name => {
        merged[period][name] = { on:true, score:0 };
      });
    }
    state[cat] = merged;
  }
}

async function loadState(){
  for (const cat of Object.keys(DEFAULTS)){
    let saved = null;
    try{
      const res = await window.storage.get('decide:' + cat);
      saved = JSON.parse(res.value);
    }catch(e){
      saved = null;
    }

    if (DEFAULTS[cat].isRange){
      state[cat] = (saved && typeof saved.min === 'number' && typeof saved.max === 'number')
        ? saved
        : { min: DEFAULTS[cat].defaultMin, max: DEFAULTS[cat].defaultMax };
      if (!saved) await saveState(cat);
      continue;
    }

    const merged = {};
    let changed = false;
    for (const period of Object.keys(DEFAULTS[cat].items)){
      merged[period] = (saved && saved[period]) ? saved[period] : {};
      DEFAULTS[cat].items[period].forEach(name => {
        if (!merged[period][name]){
          merged[period][name] = { on:true, score:0 };
          changed = true;
        }
      });
    }
    state[cat] = merged;
    if (!saved || changed){
      await saveState(cat);
    }
  }
}

async function saveState(cat){
  // Never let a storage failure (offline, storage unavailable, quota, etc.)
  // break the caller — init/render must proceed regardless.
  try{
    const result = await window.storage.set('decide:' + cat, JSON.stringify(state[cat]));
    if (!result){
      console.error('Storage save returned no result for', cat);
    }
  }catch(e){
    console.error('Storage save failed for', cat, e);
  }
}

function activeCategory(){
  return current.category || 'eat';
}

function periodForCategory(cat){
  if (cat === 'eat') return mealPeriod();
  return 'any';
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  Object.keys(DEFAULTS).forEach(cat => {
    const el = document.createElement('div');
    el.className = 'tab' + (activeCategory() === cat ? ' active' : '');
    const shortLabel = DEFAULTS[cat].short || DEFAULTS[cat].label.replace('What to ','');
    el.textContent = DEFAULTS[cat].icon + '  ' + shortLabel;
    el.onclick = () => { current.category = cat; current.item = null; render(); };
    tabs.appendChild(el);
  });
}

function renderTimeBadge(){
  const badge = document.getElementById('timeBadge');
  if (activeCategory() === 'eat'){
    const p = mealPeriod();
    badge.textContent = "Reading the clock — it's " + p + " time";
  } else {
    badge.textContent = '';
  }
}

function renderStage(){
  const stage = document.getElementById('stage');
  const cat = activeCategory();
  const isRange = DEFAULTS[cat].isRange;
  const period = isRange ? null : periodForCategory(cat);
  const pool = isRange ? {} : (state[cat][period] || {});
  const enabledCount = isRange ? 1 : Object.values(pool).filter(v => v.on).length;

  stage.innerHTML = '';

  if (enabledCount === 0){
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.innerHTML = 'No options turned on for this yet.<br>Tap "Edit my options" below to pick a few.';
    stage.appendChild(hint);
    return;
  }

  if (current.item){
    const ticket = document.createElement('div');
    ticket.className = 'ticket';
    const hasTranslation = !!TH[current.item];
    const displayText = (showingThai && hasTranslation) ? TH[current.item] : current.item;
    ticket.innerHTML = '<p class="ticket-label">' + DEFAULTS[cat].label + '</p><p class="ticket-result">' + displayText + '</p>';
    stage.appendChild(ticket);

    const fb = document.createElement('div');
    fb.className = 'feedback-row';
    fb.innerHTML = `<div class="fbtn th" title="Translate to Thai">TH</div>`;
    fb.children[0].onclick = () => toggleTranslate();
    stage.appendChild(fb);

    const row = document.createElement('div');
    row.className = 'dial-row';
    const dial = document.createElement('button');
    dial.className = 'dial';
    dial.textContent = 'AGAIN';
    dial.onclick = () => pick();
    row.appendChild(dial);
    stage.appendChild(row);
  } else {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = 'Tap the dial for a suggestion.';
    stage.appendChild(hint);

    const row = document.createElement('div');
    row.className = 'dial-row';
    const dial = document.createElement('button');
    dial.className = 'dial';
    dial.textContent = 'DECIDE';
    dial.onclick = () => pick();
    row.appendChild(dial);
    stage.appendChild(row);
  }
}

function pick(){
  const cat = activeCategory();
  if (DEFAULTS[cat].isRange){
    const { min, max } = state[cat];
    current.item = String(min + Math.floor(Math.random() * (max - min + 1)));
    showingThai = false;
    renderStage();
    return;
  }
  const period = periodForCategory(cat);
  const pool = state[cat][period] || {};
  const entries = Object.entries(pool).filter(([,v]) => v.on);
  if (entries.length === 0) return;

  const weighted = [];
  entries.forEach(([name, v]) => {
    const weight = Math.max(1, 3 + v.score);
    for (let i=0;i<weight;i++) weighted.push(name);
  });
  const choice = weighted[Math.floor(Math.random()*weighted.length)];
  current.item = choice;
  showingThai = false;
  renderStage();
}

function toggleTranslate(){
  if (!TH[current.item]){
    const badge = document.getElementById('timeBadge');
    const original = badge.textContent;
    badge.textContent = "No Thai translation saved for this one yet";
    setTimeout(() => { badge.textContent = original; }, 1600);
    return;
  }
  showingThai = !showingThai;
  renderStage();
}

async function rate(delta){
  const cat = activeCategory();
  const period = periodForCategory(cat);
  if (!current.item || !state[cat][period][current.item]) return;
  state[cat][period][current.item].score += delta;
  await saveState(cat);
  const badge = document.getElementById('timeBadge');
  const original = badge.textContent;
  badge.textContent = delta > 0 ? "Got it — showing this more often" : "Got it — showing this less often";
  setTimeout(() => { badge.textContent = original; }, 1400);
}

function renderSetup(){
  const zone = document.getElementById('setupZone');
  zone.innerHTML = '';
  if (!editMode) return;

  const cat = activeCategory();

  if (DEFAULTS[cat].isRange){
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = 'Range: ' + state[cat].min + ' – ' + state[cat].max;
    zone.appendChild(title);

    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.flexDirection = 'column';
    wrap.style.gap = '14px';

    const startRow = document.createElement('div');
    startRow.innerHTML = '<div style="font-size:13px;color:var(--sage);margin-bottom:4px;">Start</div>';
    const startSlider = document.createElement('input');
    startSlider.type = 'range';
    startSlider.min = '0';
    startSlider.max = '100';
    startSlider.value = state[cat].min;
    startSlider.style.width = '100%';
    startRow.appendChild(startSlider);
    wrap.appendChild(startRow);

    const endRow = document.createElement('div');
    endRow.innerHTML = '<div style="font-size:13px;color:var(--sage);margin-bottom:4px;">End</div>';
    const endSlider = document.createElement('input');
    endSlider.type = 'range';
    endSlider.min = '0';
    endSlider.max = '100';
    endSlider.value = state[cat].max;
    endSlider.style.width = '100%';
    endRow.appendChild(endSlider);
    wrap.appendChild(endRow);

    const commit = async () => {
      let min = parseInt(startSlider.value, 10);
      let max = parseInt(endSlider.value, 10);
      if (min > max) { max = min; endSlider.value = max; }
      state[cat].min = min;
      state[cat].max = max;
      title.textContent = 'Range: ' + min + ' – ' + max;
      await saveState(cat);
    };
    startSlider.oninput = commit;
    endSlider.oninput = commit;

    zone.appendChild(wrap);
    return;
  }

  Object.keys(DEFAULTS[cat].items).forEach(period => {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = cat === 'eat' ? capitalize(period) + ' options' : 'Your options';
    zone.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'chip-grid';
    const pool = state[cat][period];
    Object.keys(pool).forEach(name => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (pool[name].on ? ' on' : '');
      chip.textContent = name;
      chip.onclick = async () => {
        pool[name].on = !pool[name].on;
        await saveState(cat);
        renderSetup();
        renderStage();
      };
      grid.appendChild(chip);
    });
    zone.appendChild(grid);

    const addRow = document.createElement('div');
    addRow.className = 'add-row';
    addRow.innerHTML = '<input type="text" placeholder="Add your own..."><button>Add</button>';
    const input = addRow.querySelector('input');
    const btn = addRow.querySelector('button');
    const addItem = async () => {
      const val = input.value.trim();
      if (!val) return;
      pool[val] = { on:true, score:0 };
      input.value = '';
      await saveState(cat);
      renderSetup();
      renderStage();
    };
    btn.onclick = addItem;
    input.onkeydown = (e) => { if (e.key === 'Enter') addItem(); };
    zone.appendChild(addRow);
  });
}

function capitalize(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

function render(){
  renderTabs();
  renderTimeBadge();
  renderStage();
  renderSetup();
}

document.getElementById('editToggle').onclick = () => {
  editMode = !editMode;
  document.getElementById('editToggle').textContent = editMode ? 'Done editing' : 'Edit my options';
  renderSetup();
};

buildDefaultState();
current.category = 'eat';
render();

(async () => {
  try{
    await loadState();
    render();
  }catch(e){
    console.error('loadState failed, staying on in-memory defaults', e);
  }
})();
</script>
